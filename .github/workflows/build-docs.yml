name: Build Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/scripts/**'

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run docs build script
        run: node .github/scripts/build-docs.mjs

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild docs index [skip ci]"
          file_pattern: src/assets/docs/**
