name: Build Details and Orama Index

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/build-memory.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo '{"type":"module"}' > package.json
          npm install marked @orama/orama @xenova/transformers

      - name: Build Manifest, JSON Chunks, and Orama Index
        run: |
          mkdir -p src/assets/docs/content

          cat << 'EOF' > builder.mjs
          import fs from 'fs';
          import path from 'path';
          import { marked } from 'marked';
          import { create, insert, save } from '@orama/orama';
          import { pipeline } from '@xenova/transformers';

          const sourceDir = path.join(process.cwd(), 'docs');
          const outputDir = path.join(process.cwd(), 'src', 'assets', 'docs');
          const contentDir = path.join(outputDir, 'content');
          const manifestPath = path.join(outputDir, 'manifest.json');
          const oramaPath = path.join(outputDir, 'orama-index.json');

          let manifest = [];

          function ensureDir(dir) {
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
          }

          async function build() {
            console.log('Loading embedding model...');
            const extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');

            const db = await create({
              schema: {
                id: 'string',
                title: 'string',
                category: 'string',
                content: 'string',
                embeddings: 'vector[384]'   // all-MiniLM-L6-v2 is 384 dimensions
              }
            });

            async function processDirAsync(dir) {
              if (!fs.existsSync(dir)) return;
              const files = fs.readdirSync(dir);

              for (const f of files) {
                const dirPath = path.join(dir, f);

                if (fs.statSync(dirPath).isDirectory()) {
                  await processDirAsync(dirPath);
                } else if (f.endsWith('.md')) {
                  const slug = path.relative(sourceDir, dirPath).replace(/\.md$/, '');
                  const title = path.basename(dirPath, '.md').replace(/-/g, ' ');
                  const category = slug.split('/')[0] || 'default';

                  manifest.push({ slug, title, category });

                  const rawContent = fs.readFileSync(dirPath, 'utf-8');
                  const htmlContent = marked(rawContent);
                  const sanitizedId = slug.replace(/\//g, '_');

                  fs.writeFileSync(
                    path.join(contentDir, `${sanitizedId}.json`),
                    JSON.stringify({ id: slug, html: htmlContent })
                  );

                  // Generate embeddings using lighter model
                  const textToEmbed = `${title}. ${rawContent.slice(0, 512)}`;
                  const output = await extractor(textToEmbed, { pooling: 'mean', normalize: true });
                  const vectorArray = Array.from(output.data);

                  await insert(db, {
                    id: slug,
                    title,
                    category,
                    content: rawContent.slice(0, 500),
                    embeddings: vectorArray
                  });

                  console.log(`Indexed: ${slug}`);
                }
              }
            }

            ensureDir(contentDir);
            await processDirAsync(sourceDir);

            fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2));

            const indexExport = await save(db);
            fs.writeFileSync(oramaPath, JSON.stringify(indexExport));

            console.log(`Successfully processed ${manifest.length} documents.`);
          }

          build().catch(console.error);
          EOF

          node builder.mjs

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/assets/docs/manifest.json src/assets/docs/content/ src/assets/docs/orama-index.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate manifest, chunks, and orama embeddings from /docs" && git push)
