name: Build Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/scripts/**'
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo '{"type":"module"}' > package.json
          npm install glob gray-matter marked @orama/orama

      - name: Run docs build script
        run: node .github/scripts/build-docs.mjs

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild docs index"
          file_pattern: src/assets/docs/**
